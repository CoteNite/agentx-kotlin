server:
  port: 8088
  servlet:
    context-path: /api
  # 添加Tomcat异步请求配置
  tomcat:
    threads:
      max: 200 # 最大工作线程数
    connection-timeout: 20000 # 连接超时毫秒
    max-connections: 10000 # 最大连接数
    accept-count: 100 # 等待队列长度
    # 异步请求相关设置
    async-timeout: 300000 # 异步请求超时时间 5分钟


spring:
  application:
    name: AgentX-Kotlin
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentx}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # 跨域配置
  mvc:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: cn.cotenite.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    type-handlers-package: cn.cotenite.infrastructure.converter
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted_at
      logic-delete-value: now()
      logic-not-delete-value: "null"
    banner: false

# LLM服务配置
llm:
  provider:
    default: ${LLM_DEFAULT_PROVIDER:siliconflow}
    providers:
      siliconflow:
        name: SiliconFlow
        api-url: ${SILICONFLOW_API_URL:https://api.siliconflow.cn/v1/chat/completions}
        api-key: ${SILICONFLOW_API_KEY:}
        model: ${SILICONFLOW_MODEL:Pro/deepseek-ai/DeepSeek-V3.2}
        timeout: ${SILICONFLOW_TIMEOUT:30000}

mail:
  smtp:
    host: ${MAIL_SMTP_HOST:qq}
    port: ${MAIL_SMTP_PORT:25}
    username: ${MAIL_SMTP_USERNAME:xx}
    password: ${MAIL_SMTP_PASSWORD:xx}
  verification:
    template: ${MAIL_VERIFICATION_TEMPLATE:您的验证码是:%s，有效期10分钟，请勿泄露给他人。}
    subject: ${MAIL_VERIFICATION_SUBJECT:AgentX - 邮箱验证码}

logging:
  level:
    root: info
    cn.cotenite: debug
  file:
    name: logs/agent-x.log

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:}

github:
  target:
    username: ${GITHUB_TARGET_USERNAME:CoteNite}
    repo-name: ${GITHUB_TARGET_REPO_NAME:agent-mcp-community}
    token: ${GITHUB_TARGET_TOKEN:}

mcp:
  gateway:
    api-key: 123456
    base-url: http://localhost:8005

# S3对象存储配置
s3:
  # 1. 指向你本地 Docker 启动的 Minio API 端口
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  # 2. 填入你 docker run 时设置的用户名 (ROOT_USER)
  access-key: ${S3_ACCESS_KEY:minioadmin}
  # 3. 填入你 docker run 时设置的密码 (ROOT_PASSWORD)
  secret-key: ${S3_SECRET_KEY:minioadmin}
  # 4. 填入你在 Minio 控制台手动创建好的 Bucket 名称
  bucket-name: ${S3_BUCKET_NAME:agentx}
  # 5. Minio 本地单机部署通常随便填，或者填 us-east-1
  region: ${S3_REGION:us-east-1}
  # 6. 重要：Minio 建议设置为 true（路径样式访问）
  # 访问方式会从 bucket.127.0.0.1:9000 变成 127.0.0.1:9000/bucket
  path-style-access: ${S3_PATH_STYLE_ACCESS:true}
  # 7. 可选：如果你的图片需要公网回显，且没有配置 Nginx 转发
  # 可以直接配置为 http://127.0.0.1:9000/my-test-bucket/
  url-prefix: ${S3_URL_PREFIX:}
  custom-domain: ${S3_CUSTOM_DOMAIN:}

# 高可用网关配置
high-availability:
  enabled: false # 是否启用高可用功能
  gateway-url: ${HIGH_AVAILABILITY_GATEWAY_URL:http://localhost:8081} # 高可用网关地址
  api-key: ${HIGH_AVAILABILITY_API_KEY:default-api-key-1234567890} # API密钥
  connect-timeout: 30000 # 连接超时时间(毫秒)
  read-timeout: 60000 # 读取超时时间(毫秒)